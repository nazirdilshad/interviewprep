.toggle-group{display:flex;gap:0;margin-left:auto}

.toggle-group button:first-child{border-radius:8px 0 0 8px}
.toggle-group button:last-child{border-radius:0 8px 8px 0}
.toggle-group button.active{background:rgba(0,210,255,.15);color:#00d2ff;border-color:rgba(0,210,255,.3)}
.content{padding:1rem 2rem 4rem}
.day-section{margin-bottom:1.5rem}

.fill-d{background:linear-gradient(90deg,#00d2ff,#3a7bd5)}
.fill-y{background:linear-gradient(90deg,#ff6b6b,#ffa502)}
.problem-row{display:grid;grid-template-columns:42px 42px 1fr 90px 160px 50px 100px 100px;align-items:center;gap:.5rem;padding:.6rem 1rem;border-radius:8px;transition:background .15s;border-bottom:1px solid rgba(255,255,255,.03)}
.problem-row:hover{background:rgba(255,255,255,.04)}
.problem-row.solved-both{opacity:.5}
.prob-id{color:#6b6b8d;font-size:.85rem;font-weight:500}

.check-cell{display:flex;justify-content:center}
.custom-check{position:relative;width:28px;height:28px;cursor:pointer}

.custom-check input:checked+.mark{border-color:transparent;animation:pop .3s ease}
.custom-check.user-dilshad input:checked+.mark{background:linear-gradient(135deg,#00d2ff,#3a7bd5);box-shadow:0 0 12px rgba(0,210,255,.3)}
.custom-check.user-yash input:checked+.mark{background:linear-gradient(135deg,#ff6b6b,#ffa502);box-shadow:0 0 12px rgba(255,107,107,.3)}

.toast{position:fixed;bottom:24px;right:24px;background:rgba(0,210,255,.9);color:#fff;padding:.75rem 1.25rem;border-radius:10px;font-weight:600;font-size:.85rem;opacity:0;transform:translateY(20px);transition:all .3s ease;z-index:100;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}
@media(max-width:900px){
.problem-row,.col-header{grid-template-columns:35px 35px 1fr 70px 50px 50px}

}
</style>

function parseCSV(){
  const lines=CSV_DATA.trim().split('\n');
  const patterns=new Set();
  for(let i=1;i<lines.length;i++){
    const l=lines[i].trim();if(!l)continue;
    const p=l.split(',');if(p.length<8||!p[0].startsWith('Day'))continue;
    const obj={day:p[0],num:p[1],id:p[2],title:p[3],difficulty:p[4],pattern:p[5],freq:parseFloat(p[6]),link:p[7]};
    PROBLEMS.push(obj);patterns.add(p[5]);
  }
  const dayFilter=document.getElementById('dayFilter');
  const days=[...new Set(PROBLEMS.map(p=>p.day))].sort((a,b)=>parseInt(a.replace('Day ',''))-parseInt(b.replace('Day ','')));
  days.forEach(d=>{const o=document.createElement('option');o.value=d;o.textContent=d;dayFilter.appendChild(o)});
  const pf=document.getElementById('patternFilter');
  [...patterns].sort().forEach(p=>{const o=document.createElement('option');o.value=p;o.textContent=p;pf.appendChild(o)});
}

async function loadProgress(){
  try{const r=await fetch('/api/progress');progress=await r.json()}catch(e){progress=JSON.parse(localStorage.getItem('progress')||'{}')}
  updateStats();
}

async function toggleSolved(problemId,user,checked){
  progress[problemId]=progress[problemId]||{};
  progress[problemId][user]=checked;
  localStorage.setItem('progress',JSON.stringify(progress));
  try{await fetch('/api/progress',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({problemId,user,solved:checked})})}catch(e){}
  updateStats();
  showToast(checked?`✅ ${user==='dilshad'?'Dilshad':'Yash'} solved #${problemId}!`:`↩️ #${problemId} unmarked`);
}

function updateStats(){
  let d=0,y=0;
  for(const pid in progress){if(progress[pid].dilshad)d++;if(progress[pid].yash)y++}
  document.getElementById('dSolved').textContent=d;
  document.getElementById('ySolved').textContent=y;
  const total=PROBLEMS.length||1;
  document.getElementById('dBar').style.width=((d/total)*100)+'%';
  document.getElementById('yBar').style.width=((y/total)*100)+'%';
}

function setView(mode,btn){
  viewMode=mode;
  document.querySelectorAll('.toggle-group button').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');renderAll();
}

function renderAll(){
  const dayV=document.getElementById('dayFilter').value;
  const diffV=document.getElementById('diffFilter').value;
  const patV=document.getElementById('patternFilter').value;
  const searchV=document.getElementById('searchBox').value.toLowerCase();

  let filtered=PROBLEMS.filter(p=>{
    if(dayV!=='all'&&p.day!==dayV)return false;
    if(diffV!=='all'&&p.difficulty!==diffV)return false;
    if(patV!=='all'&&p.pattern!==patV)return false;
    if(searchV&&!p.title.toLowerCase().includes(searchV))return false;
    const pr=progress[p.id]||{};
    if(viewMode==='solved'&&!pr.dilshad&&!pr.yash)return false;
    if(viewMode==='unsolved'&&(pr.dilshad||pr.yash))return false;
    return true;
  });

  const container=document.getElementById('problemList');
  container.innerHTML='';
  let currentDay='';

  filtered.forEach(p=>{
    if(p.day!==currentDay){
      currentDay=p.day;
      const dayProbs=filtered.filter(x=>x.day===currentDay);
      let dd=0,dy=0;dayProbs.forEach(x=>{const pr=progress[x.id]||{};if(pr.dilshad)dd++;if(pr.yash)dy++});
      const sec=document.createElement('div');sec.className='day-section';
      const dpct=dayProbs.length?Math.round((dd/dayProbs.length)*100):0;
      const ypct=dayProbs.length?Math.round((dy/dayProbs.length)*100):0;
      sec.innerHTML=`<div class="day-header"><span class="day-label">📅 ${currentDay}</span><div class="day-progress"><span>💙 ${dd}/${dayProbs.length}</span><div class="mini-bar"><div class="mini-bar-fill fill-d" style="width:${dpct}%"></div></div><span>🧡 ${dy}/${dayProbs.length}</span><div class="mini-bar"><div class="mini-bar-fill fill-y" style="width:${ypct}%"></div></div></div></div>`;
      container.appendChild(sec);
    }

    const pr=progress[p.id]||{};
    const bothSolved=(pr.dilshad&&pr.yash)?'solved-both':'';
    const row=document.createElement('div');
    row.className=`problem-row ${bothSolved}`;
    row.innerHTML=`
      <span class="prob-id">${p.num}</span>
      <span class="prob-id">${p.id}</span>
      <span class="prob-title"><a href="${p.link}" target="_blank">${p.title}</a></span>
      <span><span class="diff-badge diff-${p.difficulty}">${p.difficulty}</span></span>
      <span class="pattern-tag">${p.pattern}</span>
      <span class="freq">${p.freq.toFixed(1)}</span>
      <div class="check-cell"><label class="custom-check user-dilshad"><input type="checkbox" ${pr.dilshad?'checked':''} onchange="toggleSolved('${p.id}','dilshad',this.checked)"><span class="mark">✓</span></label></div>
      <div class="check-cell"><label class="custom-check user-yash"><input type="checkbox" ${pr.yash?'checked':''} onchange="toggleSolved('${p.id}','yash',this.checked)"><span class="mark">✓</span></label></div>`;
    container.appendChild(row);
  });
}

function showToast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}

parseCSV();loadProgress().then(()=>renderAll());
</script>
